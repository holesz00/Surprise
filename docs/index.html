<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Piccnek!</title>
<style>
body{
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg,#ff9a9e,#fad0c4);
  margin:0;
  height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  color:#333;
  overflow: hidden; /* virágszirmok ne lógjanak ki */
}
.card{
  background:white;
  padding:40px;
  border-radius:20px;
  box-shadow:0 10px 30px rgba(0,0,0,0.2);
  text-align:center;
  max-width:500px;
  position: relative;
  z-index: 10;
}
h1{
  font-size:36px;
  margin-bottom:10px;
}
.message{
  font-size:18px;
  margin:20px 0;
  line-height:1.6;
}
button{
  background:#ff6b81;
  border:none;
  color:white;
  padding:12px 24px;
  font-size:16px;
  border-radius:10px;
  cursor:pointer;
}
button:hover{
  background:#ff4f6d;
}
.hidden{
  display:none;
  margin-top:20px;
}
img{
  max-width:100%;
  border-radius:15px;
  margin-top:15px;
}
.flower{
  position: fixed;
  width: 30px;
  height: 30px;
  pointer-events: none;
  z-index: 5;
  top: -50px;
  animation: fall linear forwards;
}
@keyframes fall{
  0% {transform: translateY(0) rotate(0deg);}
  100% {transform: translateY(100vh) rotate(360deg);}
}
</style>
</head>
<body>

<div class="card">
<h1>Boldog Nőnapot Piccc! 🌸</h1>
<div class="message">
Szerettem volna valami apró meglepetést küldeni neked,
még akkor is, ha most messze vagyunk egymástól.
</div>

<button onclick="showSurprise()">Punch ❤️</button>

<div id="secret" class="hidden">
<p>Te vagy a legfontosabb nekem. 💕</p>
<img src="kep.jpg" alt="Közös képünk">
</div>

<audio id="music" src="zene.mp3" type="audio/mpeg"></audio>

<script>
// virágszirmok létrehozása repositoryból
function createFlower(){
  const flower = document.createElement('div');
  flower.className = 'flower';
  flower.style.left = Math.random() * window.innerWidth + 'px';
  flower.style.animationDuration = (3 + Math.random()*3) + 's';
  flower.style.backgroundImage = 'url("flower.png")'; // a feltöltött PNG fájl
  flower.style.backgroundSize = 'contain';
  flower.style.backgroundRepeat = 'no-repeat';
  document.body.appendChild(flower);
  setTimeout(()=>{flower.remove()}, 10000);
}
// folyamatos hullás
setInterval(createFlower, 200); // minden 200ms új szirmot hoz létre
  
// kattintáskor indul minden
function showSurprise(){
  const secret = document.getElementById('secret');
  const music = document.getElementById('music');
  
  secret.style.display = 'block';
  music.play().catch(() => {
    alert('Kattints a play gombra a zene elindításához!');
  });

  // virágszirmok folyamatosan
  for(let i=0;i<50;i++){
    setTimeout(createFlower, i*200);
  }
}
</script>

</body>
</html>
